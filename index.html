<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>イニシャルT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #8ecbef; }
  canvas { display: block; }
  #hud, #loading, #map-select { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif; user-select: none; }

  #loading {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: #16202a; color: #cfe6f5; font-size: 18px; letter-spacing: 2px;
  }
  #loading .err { text-align: center; line-height: 2; }
  #loading code { color: #ffd479; }

  /* タイトル / マップ選択 */
  #map-select {
    position: fixed; inset: 0; z-index: 20; display: none;
    align-items: center; justify-content: center; color: #20252a; overflow: hidden;
    background:
      radial-gradient(circle at 74% 18%, rgba(255,255,255,0.88), transparent 28%),
      linear-gradient(135deg, #fff9df 0%, #eee2b9 58%, #d8c991 100%);
  }
  #map-select::before {
    content: ""; position: absolute; left: -8%; right: -8%; top: 43%; height: 70px;
    transform: rotate(-4deg) skewX(-18deg);
    background: repeating-linear-gradient(
      to bottom,
      #d92120 0 7px, transparent 7px 12px,
      #f14b22 12px 18px, transparent 18px 24px
    );
    filter: drop-shadow(0 3px 0 rgba(108,20,15,0.22));
  }
  #map-select::after {
    content: ""; position: absolute; width: 58%; height: 8px; top: 28%; left: -8%;
    transform: rotate(-5deg); background: #168bb8; box-shadow: 0 12px 0 #65bdd3;
    opacity: 0.9;
  }
  body.title #map-select { display: flex; }
  body.title #loading, body.title #demo, body.title #help,
  body.title #meter, body.title #signal { display: none !important; }
  .title-card { position: relative; z-index: 1; width: min(800px, calc(100vw - 36px)); text-align: center; }
  .title-logo {
    position: relative; display: inline-flex; align-items: flex-end;
    padding: 24px 34px 4px 12px; transform: skewX(-9deg);
  }
  .logo-kicker {
    position: absolute; top: 0; left: 23px; color: #168ab7;
    font: 900 clamp(12px, 2vw, 18px)/1 "Arial Black", "Yu Gothic", Meiryo, sans-serif;
    letter-spacing: 0.18em; text-shadow: 1px 1px 0 #fff;
  }
  .logo-name {
    font: 900 clamp(50px, 10vw, 98px)/0.82 "Arial Black", "Yu Gothic", Meiryo, sans-serif;
    letter-spacing: -0.08em; font-style: italic;
    color: #f26719; -webkit-text-stroke: 2px #9d2115;
    text-shadow: 3px 3px 0 #fff7d7, 6px 6px 0 #b62918, 9px 9px 0 rgba(84,25,14,0.26);
  }
  .logo-t {
    display: inline-block; margin-left: 0.02em; font-size: 1.45em; line-height: 0.7;
    color: #ef451b; -webkit-text-stroke: 3px #9a1d12;
  }
  .title-sub { margin: 14px 0 30px; color: #176f96; letter-spacing: 0.34em; font-size: 13px; font-weight: 800; }
  .map-choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  .map-choice {
    min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #222a30; text-decoration: none; border: 2px solid rgba(117,77,39,0.28);
    border-radius: 10px; background: rgba(255,251,230,0.94);
    box-shadow: 0 12px 25px rgba(91,57,25,0.24); transition: 150ms ease;
  }
  .map-choice:first-child { border-top: 7px solid #e9421d; }
  .map-choice:last-child { border-top: 7px solid #168bb8; }
  .map-choice:hover, .map-choice:focus-visible {
    transform: translateY(-4px) skewX(-2deg); border-color: #df3d1e; background: #fffdf0;
    box-shadow: 0 16px 32px rgba(91,57,25,0.32), 0 0 0 3px rgba(22,139,184,0.18);
  }
  .map-choice strong { font-size: 30px; letter-spacing: 0.14em; }
  .map-choice span { margin-top: 12px; color: #56636b; font-size: 13px; line-height: 1.6; }
  @media (max-width: 600px) {
    .title-logo { padding: 22px 12px 3px 4px; }
    .logo-kicker { left: 10px; }
    .logo-name { font-size: clamp(40px, 13vw, 58px); -webkit-text-stroke-width: 1.5px; }
    .logo-t { -webkit-text-stroke-width: 2px; }
    .map-choices { grid-template-columns: 1fr; }
    .map-choice { min-height: 120px; }
  }

  .panel {
    position: fixed; z-index: 5; color: #fff;
    background: rgba(12, 22, 32, 0.55); border-radius: 10px;
    padding: 10px 14px; backdrop-filter: blur(3px);
  }

  #meter { right: 16px; bottom: 16px; text-align: right; min-width: 190px; }
  #speed { font-size: 52px; font-weight: 700; font-family: "Courier New", monospace; line-height: 1; }
  #speed-unit { font-size: 13px; opacity: 0.75; margin-left: 4px; }

  #rpm-bar { margin-top: 8px; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.18); overflow: hidden; }
  #rpm-fill { height: 100%; width: 0; background: #6fd66f; border-radius: 4px; transition: width 60ms linear; }
  #rpm-fill.red { background: #ff5a48; }

  #gears { margin-top: 10px; display: flex; gap: 6px; justify-content: flex-end; }
  #gears span {
    display: inline-block; width: 24px; padding: 3px 0; text-align: center;
    border-radius: 5px; font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.55);
  }
  #gears span.on { background: #ffd043; color: #22303c; }

  #drift {
    margin-top: 8px; text-align: right; font-size: 14px; font-weight: 700;
    letter-spacing: 3px; color: #ff8a3c; opacity: 0; transition: opacity 120ms;
  }
  #drift.on { opacity: 1; text-shadow: 0 0 8px rgba(255,120,40,0.8); }

  /* 接近中の交差点の信号(自分の進行方向) */
  #signal {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 5; display: none; gap: 12px; align-items: center;
    background: rgba(16, 22, 28, 0.82); border: 2px solid #3a4046;
    border-radius: 999px; padding: 9px 16px;
  }
  #signal .slamp {
    width: 28px; height: 28px; border-radius: 50%;
    background: #23282c; transition: background 120ms, box-shadow 120ms;
  }
  #sig-g.on { background: #00c878; box-shadow: 0 0 14px #00c878; }
  #sig-y.on { background: #ffc400; box-shadow: 0 0 14px #ffc400; }
  #sig-r.on { background: #ff4438; box-shadow: 0 0 14px #ff4438; }

  #help { left: 16px; bottom: 16px; font-size: 12.5px; line-height: 1.9; opacity: 0.92; }
  #help b {
    display: inline-block; min-width: 52px; text-align: center;
    background: rgba(255,255,255,0.15); border-radius: 4px;
    padding: 1px 6px; margin-right: 8px; font-family: monospace;
  }

  /* デモ画面 */
  #demo { position: fixed; inset: 0; z-index: 6; display: none; pointer-events: none; }
  body.demo #demo { display: block; }
  #demo .word {
    position: absolute; top: 34%; left: 0; right: 0; text-align: center;
    font-weight: 800; font-size: 64px; letter-spacing: 10px; color: #fff;
    text-shadow: 0 2px 16px rgba(0,0,0,0.65);
    animation: demoBlink 1.05s steps(1, end) infinite;
  }
  #demo .hint {
    position: absolute; top: 48%; left: 0; right: 0; text-align: center;
    font-size: 15px; letter-spacing: 3px; color: rgba(255,255,255,0.85);
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
  }
  @keyframes demoBlink { 0%,49.9%{opacity:1} 50%,100%{opacity:0} }

  /* デモ中は操作パネル類を隠す */
  body.demo #help, body.demo #meter, body.demo #signal { display: none !important; }
</style>
</head>
<body>
<div id="map-select">
  <main class="title-card">
    <div class="title-logo" aria-label="イニシャルT">
      <span class="logo-kicker">TOUGE DRIFT RACING</span>
      <span class="logo-name">イニシャル<span class="logo-t">T</span></span>
    </div>
    <div class="title-sub">SELECT COURSE</div>
    <div class="map-choices">
      <a class="map-choice" href="?map=city">
        <strong>架空</strong>
        <span>環状都市・森林コース・峠の連続ヘアピン</span>
      </a>
      <a class="map-choice" href="?map=nihonbashi.gltf">
        <strong>日本橋</strong>
        <span>日本橋の3DマップをToyota 86で走行</span>
      </a>
    </div>
  </main>
</div>

<div id="loading">LOADING&hellip; 車を組み立て中</div>

<div id="demo">
  <div class="word">Demo</div>
  <div class="hint">何かキーを押すとスタート</div>
</div>

<div id="signal">
  <div class="slamp" id="sig-g"></div>
  <div class="slamp" id="sig-y"></div>
  <div class="slamp" id="sig-r"></div>
</div>

<div id="meter" class="panel">
  <span id="speed">0</span><span id="speed-unit">km/h</span>
  <div id="rpm-bar"><div id="rpm-fill"></div></div>
  <div id="gears">
    <span>R</span><span>N</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
  </div>
  <div id="drift">DRIFT!</div>
</div>

<div id="help" class="panel">
  <div><b>A</b>ブレーキ</div>
  <div><b>S</b>アクセル</div>
  <div><b>↑ / ↓</b>シフトアップ / ダウン</div>
  <div><b>← / →</b>ハンドル</div>
  <div><b>SPACE</b>サイドブレーキ(ドリフト)</div>
  <div><b>ドラッグ</b>カメラ視点&nbsp;&nbsp;<b>ホイール</b>ズーム</div>
  <div><b>M</b>サウンド ON/OFF</div>
</div>

<script type="importmap">
{ "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module">
  const mapParam = new URLSearchParams(location.search).get('map');
  if (mapParam === null) {
    document.body.classList.add('title');
  } else {
    document.getElementById('map-select').remove();
    // Bump this value whenever main.js changes so GitHub Pages/CDN caches do
    // not keep an older vehicle list or loader implementation.
    import('./js/main.js?v=20260715-1');
  }
</script>
</body>
</html>
