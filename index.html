<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>VOX DRIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #8ecbef; }
  canvas { display: block; }
  #hud, #loading { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif; user-select: none; }

  #loading {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: #16202a; color: #cfe6f5; font-size: 18px; letter-spacing: 2px;
  }
  #loading .err { text-align: center; line-height: 2; }
  #loading code { color: #ffd479; }

  .panel {
    position: fixed; z-index: 5; color: #fff;
    background: rgba(12, 22, 32, 0.55); border-radius: 10px;
    padding: 10px 14px; backdrop-filter: blur(3px);
  }

  #meter { right: 16px; bottom: 16px; text-align: right; min-width: 190px; }
  #speed { font-size: 52px; font-weight: 700; font-family: "Courier New", monospace; line-height: 1; }
  #speed-unit { font-size: 13px; opacity: 0.75; margin-left: 4px; }

  #rpm-bar { margin-top: 8px; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.18); overflow: hidden; }
  #rpm-fill { height: 100%; width: 0; background: #6fd66f; border-radius: 4px; transition: width 60ms linear; }
  #rpm-fill.red { background: #ff5a48; }

  #gears { margin-top: 10px; display: flex; gap: 6px; justify-content: flex-end; }
  #gears span {
    display: inline-block; width: 24px; padding: 3px 0; text-align: center;
    border-radius: 5px; font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.55);
  }
  #gears span.on { background: #ffd043; color: #22303c; }

  #drift {
    margin-top: 8px; text-align: right; font-size: 14px; font-weight: 700;
    letter-spacing: 3px; color: #ff8a3c; opacity: 0; transition: opacity 120ms;
  }
  #drift.on { opacity: 1; text-shadow: 0 0 8px rgba(255,120,40,0.8); }

  /* 接近中の交差点の信号(自分の進行方向) */
  #signal {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 5; display: none; gap: 12px; align-items: center;
    background: rgba(16, 22, 28, 0.82); border: 2px solid #3a4046;
    border-radius: 999px; padding: 9px 16px;
  }
  #signal .slamp {
    width: 28px; height: 28px; border-radius: 50%;
    background: #23282c; transition: background 120ms, box-shadow 120ms;
  }
  #sig-g.on { background: #00c878; box-shadow: 0 0 14px #00c878; }
  #sig-y.on { background: #ffc400; box-shadow: 0 0 14px #ffc400; }
  #sig-r.on { background: #ff4438; box-shadow: 0 0 14px #ff4438; }

  #help { left: 16px; bottom: 16px; font-size: 12.5px; line-height: 1.9; opacity: 0.92; }
  #help b {
    display: inline-block; min-width: 52px; text-align: center;
    background: rgba(255,255,255,0.15); border-radius: 4px;
    padding: 1px 6px; margin-right: 8px; font-family: monospace;
  }

  #title { left: 16px; top: 14px; font-weight: 700; letter-spacing: 3px; font-size: 15px; }
  #title small { display: block; font-weight: 400; letter-spacing: 1px; font-size: 10.5px; opacity: 0.7; margin-top: 2px; }
</style>
</head>
<body>
<div id="loading">LOADING&hellip; 車を組み立て中</div>

<div id="title" class="panel">VOX DRIVE<small>Volvoで走り回ろう</small></div>

<div id="signal">
  <div class="slamp" id="sig-g"></div>
  <div class="slamp" id="sig-y"></div>
  <div class="slamp" id="sig-r"></div>
</div>

<div id="meter" class="panel">
  <span id="speed">0</span><span id="speed-unit">km/h</span>
  <div id="rpm-bar"><div id="rpm-fill"></div></div>
  <div id="gears">
    <span>R</span><span>N</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
  </div>
  <div id="drift">DRIFT!</div>
</div>

<div id="help" class="panel">
  <div><b>A</b>アクセル</div>
  <div><b>S</b>ブレーキ</div>
  <div><b>↑ / ↓</b>シフトアップ / ダウン</div>
  <div><b>← / →</b>ハンドル</div>
  <div><b>SPACE</b>サイドブレーキ(ドリフト)</div>
  <div><b>ドラッグ</b>カメラ視点&nbsp;&nbsp;<b>ホイール</b>ズーム</div>
  <div><b>M</b>サウンド ON/OFF</div>
</div>

<script type="importmap">
{ "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
